name: Archiwum 13 static validation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show archive structure
        run: |
          echo "ARCHIWUM 13 SAS — static archive validation"
          find . -maxdepth 3 -type f | sort | head -200

      - name: Check required archive entry files
        run: |
          test -f README.md
          test -f 07_APP/ARCHIWUM_13_START.html
          test -f 05_T777/rejestr_t777.csv

      - name: Check CSV manifests exist if present
        run: |
          echo "CSV files:"
          find . -name "*.csv" -maxdepth 5 -print | sort || true

      - name: Finish
        run: echo "Validation OK: repository is treated as a static archive, not a Node.js app."
