<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Archiwum 13 SAS | Teczka 777</title>
  <style>
    :root { --bg:#101114; --panel:#191b20; --panel2:#22252c; --text:#f2efe7; --muted:#b8b2a6; --gold:#c8a45d; --line:#3a3440; --danger:#b45b5b; }
    *{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
    header{padding:28px 22px;border-bottom:1px solid var(--line);background:linear-gradient(135deg,#15161a,#272018)}
    h1{margin:0;font-size:30px;letter-spacing:.5px} .sub{color:var(--muted);margin-top:8px;max-width:980px;line-height:1.5}
    main{display:grid;grid-template-columns:360px 1fr;min-height:calc(100vh - 118px)}
    aside{border-right:1px solid var(--line);background:var(--panel);padding:18px;overflow:auto}.content{padding:18px;overflow:auto}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.tab{border:1px solid var(--line);background:var(--panel2);color:var(--text);padding:9px 11px;border-radius:10px;cursor:pointer}.tab.active{border-color:var(--gold);color:var(--gold)}
    .search{width:100%;padding:12px;border-radius:10px;border:1px solid var(--line);background:#0d0e11;color:var(--text);margin-bottom:12px}
    .item{border:1px solid var(--line);background:var(--panel2);border-radius:12px;padding:12px;margin:10px 0;cursor:pointer}.item:hover{border-color:var(--gold)}.item.active{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset}
    .code{font-size:12px;color:var(--gold);font-weight:bold}.title{font-size:16px;margin:5px 0}.meta{font-size:12px;color:var(--muted);line-height:1.45}
    .viewer{border:1px solid var(--line);border-radius:14px;background:var(--panel);padding:16px;min-height:520px}.viewer h2{margin-top:0}.badge{display:inline-block;border:1px solid var(--gold);color:var(--gold);padding:4px 8px;border-radius:999px;font-size:12px;margin-right:6px}.warn{border-color:var(--danger);color:#ffb4b4}
    iframe{width:100%;height:72vh;border:1px solid var(--line);border-radius:10px;background:#fff}.imgbox img{max-width:100%;border-radius:10px;border:1px solid var(--line);background:#fff}.empty{color:var(--muted);line-height:1.6}.btn{display:inline-block;margin:8px 8px 8px 0;padding:10px 12px;border-radius:10px;border:1px solid var(--line);color:var(--text);text-decoration:none;background:var(--panel2)}.btn:hover{border-color:var(--gold);color:var(--gold)}
    table{border-collapse:collapse;width:100%;margin-top:12px}td,th{border:1px solid var(--line);padding:8px;text-align:left}th{color:var(--gold)}
    @media(max-width:850px){main{grid-template-columns:1fr}aside{border-right:0;border-bottom:1px solid var(--line)}iframe{height:65vh}}
  </style>
</head>
<body>
<header>
  <h1>Archiwum 13 SAS</h1>
  <div class="sub">Klikany rdzeń archiwum T777. To jest publiczny punkt wejścia: dokumenty pierwotne, indeksy, zdjęcia, PDF i metadane. Pliki fizyczne należy wkładać do katalogów <b>assets/pdf</b> i <b>assets/img</b>.</div>
</header>
<main>
  <aside>
    <div class="tabs">
      <button class="tab active" data-filter="all">Wszystko</button>
      <button class="tab" data-filter="pdf">PDF</button>
      <button class="tab" data-filter="image">Zdjęcia</button>
      <button class="tab" data-filter="record">Rejestry</button>
    </div>
    <input id="search" class="search" placeholder="Szukaj: Jan, IPN, T777, Buczacz..." />
    <div id="list"></div>
  </aside>
  <section class="content"><div id="viewer" class="viewer"></div></section>
</main>
<script>
const records = [
 {id:'START', type:'record', title:'Mapa wejścia do Archiwum 13 SAS', date:'2026-04-25', status:'DZIAŁA', path:'README.md', desc:'Główna mapa repozytorium i logiczny opis struktury pracy.'},
 {id:'T777-REJESTR', type:'record', title:'Rejestr Teczki 777', date:'robocze', status:'CSV', path:'05_T777/rejestr_t777.csv', desc:'Centralny rejestr materiału dowodowego Teczki 777.'},
 {id:'ARTEFAKTY', type:'record', title:'Rejestr artefaktów rodu', date:'robocze', status:'CSV', path:'06_NOTATKI/ARTEFAKTY_RODU.csv', desc:'Rejestr artefaktów rodzinnych, pamiątek, obiektów i nośników.'},
 {id:'PRASA', type:'record', title:'Rejestr pozycji prasowych', date:'robocze', status:'CSV', path:'02_I/pozycje_prasowe.csv', desc:'Indeks pozycji prasowych i wtórnych.'},
 {id:'IPN-JAN', type:'record', title:'Indeks etapu IPN / Jan', date:'2026-04-23', status:'MD', path:'06_NOTATKI/index_ipn_jan.md', desc:'Punkt wejścia do etapu IPN dotyczącego Jana Stanisława Baczyńskiego.'},
 {id:'P001', type:'pdf', title:'Miejsce na PDF P001', date:'do wpięcia', status:'BRAK PLIKU', path:'assets/pdf/P001.pdf', desc:'Wrzuć plik jako assets/pdf/P001.pdf, a podgląd zacznie działać automatycznie.'},
 {id:'P002', type:'pdf', title:'Miejsce na PDF P002', date:'do wpięcia', status:'BRAK PLIKU', path:'assets/pdf/P002.pdf', desc:'Wrzuć plik jako assets/pdf/P002.pdf.'},
 {id:'IMG001', type:'image', title:'Miejsce na zdjęcie IMG001', date:'do wpięcia', status:'BRAK PLIKU', path:'assets/img/IMG001.jpg', desc:'Wrzuć zdjęcie jako assets/img/IMG001.jpg.'},
 {id:'IMG002', type:'image', title:'Miejsce na zdjęcie IMG002', date:'do wpięcia', status:'BRAK PLIKU', path:'assets/img/IMG002.jpg', desc:'Wrzuć zdjęcie jako assets/img/IMG002.jpg.'}
];
let filter='all';
const list=document.getElementById('list'), viewer=document.getElementById('viewer'), search=document.getElementById('search');
function renderList(){const q=search.value.toLowerCase(); list.innerHTML=''; records.filter(r=>(filter==='all'||r.type===filter)&&Object.values(r).join(' ').toLowerCase().includes(q)).forEach((r,i)=>{const el=document.createElement('div');el.className='item';el.innerHTML=`<div class="code">${r.id}</div><div class="title">${r.title}</div><div class="meta">${r.type.toUpperCase()} · ${r.date} · ${r.status}</div>`;el.onclick=()=>openRecord(r,el);list.appendChild(el);});}
function openRecord(r){document.querySelectorAll('.item').forEach(x=>x.classList.remove('active'));event?.currentTarget?.classList.add('active');let body=`<span class="badge">${r.type}</span><span class="badge ${r.status.includes('BRAK')?'warn':''}">${r.status}</span><h2>${r.id}: ${r.title}</h2><p class="empty">${r.desc}</p><table><tr><th>Ścieżka</th><td>${r.path}</td></tr><tr><th>Data/status</th><td>${r.date}</td></tr></table><p><a class="btn" href="${r.path}" target="_blank">Otwórz plik bezpośrednio</a><a class="btn" href="https://github.com/komendantmb/archiwum_13_sas" target="_blank">Repo GitHub</a></p>`;
 if(r.type==='pdf') body += `<iframe src="${r.path}"></iframe><p class="empty">Jeżeli tu jest biała strona albo 404, to znaczy, że fizyczny PDF nie został jeszcze wrzucony pod powyższą ścieżkę.</p>`;
 if(r.type==='image') body += `<div class="imgbox"><img src="${r.path}" onerror="this.style.display='none';document.getElementById('imgerr').style.display='block'" /></div><p id="imgerr" class="empty" style="display:none">Zdjęcie nie istnieje jeszcze pod tą ścieżką. Wrzuć plik do repo i odśwież stronę.</p>`;
 if(r.type==='record') body += `<iframe src="${r.path}"></iframe>`;
 viewer.innerHTML=body;}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');filter=b.dataset.filter;renderList();});search.oninput=renderList;renderList();openRecord(records[0]);
</script>
</body>
</html>
